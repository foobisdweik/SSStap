name: Build installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Fetch wintun.dll
        shell: pwsh
        run: |
          $dest = "assets\native\wintun.dll"
          if (-not (Test-Path $dest)) {
            $zip = Join-Path $env:TEMP "wintun-0.14.1.zip"
            $ext = Join-Path $env:TEMP "wintun-extract"
            Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile $zip -UseBasicParsing -TimeoutSec 120
            Expand-Archive -Path $zip -DestinationPath $ext -Force
            New-Item -ItemType Directory -Force -Path "assets\native" | Out-Null
            Copy-Item "$ext\wintun\bin\amd64\wintun.dll" -Destination $dest -Force
            Write-Host "wintun.dll fetched OK."
          }

      - name: Restore
        run: dotnet restore src/SSStap.sln -p:WINTUN_SKIP_DOWNLOAD=1
        working-directory: ${{ github.workspace }}

      - name: Test
        run: dotnet test src/SSStap.Tests/SSStap.Tests.csproj -c Release -p:WINTUN_SKIP_DOWNLOAD=1 --verbosity normal
        working-directory: ${{ github.workspace }}

      - name: Build installer
        run: ./scripts/build-release.ps1
        working-directory: ${{ github.workspace }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SSStap-installer
          path: dist/SSStap-Setup-*.exe
