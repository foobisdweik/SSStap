name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup 6
        run: |
          winget list --name "Inno Setup" | findstr "Inno Setup"
          if ($LASTEXITCODE -ne 0) {
            winget install JRSoftware.InnoSetup --accept-package-agreements --accept-source-agreements --silent
          }
          exit 0
        shell: pwsh

      - name: Restore
        run: dotnet restore src/SSStap.sln
        working-directory: ${{ github.workspace }}

      - name: Build installer
        run: ./scripts/build-release.ps1
        working-directory: ${{ github.workspace }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SSStap-installer
          path: dist/SSStap-Setup-*.exe
