name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [workspace-ci]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Fetch wintun.dll
        shell: pwsh
        run: |
          $dest = "assets\native\wintun.dll"
          if (-not (Test-Path $dest)) {
            $zip = Join-Path $env:TEMP "wintun.zip"
            $ext = Join-Path $env:TEMP "wintun-ext"
            Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile $zip -UseBasicParsing -TimeoutSec 120
            Expand-Archive $zip $ext -Force
            New-Item -ItemType Directory -Force "assets\native" | Out-Null
            Copy-Item "$ext\wintun\bin\amd64\wintun.dll" $dest -Force
          }

      - name: Restore
        run: dotnet restore src/SSStap.sln -p:WINTUN_SKIP_DOWNLOAD=1

      - name: Build
        run: dotnet build src/SSStap.sln -c Release --no-restore -p:WINTUN_SKIP_DOWNLOAD=1

      - name: Test
        run: dotnet test src/SSStap.Tests/SSStap.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish (win-x64)
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet publish src/SSStap/SSStap.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:WINTUN_SKIP_DOWNLOAD=1 `
            -o publish/

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: SSStap-win-x64
          path: publish/
          retention-days: 14
