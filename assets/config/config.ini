; SSStap config/config.ini - Application settings (basic section)
; Values: 0=false/off, 1=true/on unless otherwise noted.
; Note: Saving config from the app may overwrite this file and remove comments.

[basic]
; startup - Launch app with Windows. 0=no, 1=yes.
startup=0

; AutomaticallyEstablishConnection - Auto-connect when app starts. 0=no, 1=yes.
AutomaticallyEstablishConnection=0

; AutomaticHideWindow - Minimize to system tray on connect. 0=no, 1=yes.
AutomaticHideWindow=1

; dns_type - DNS resolution mode. 0=system/default, 1=use proxy for DNS, 2=remote/custom DNS (e.g. via Unbound).
dns_type=2

; liststyle - Proxy list display style. 0=list view, 1=card/alternative view.
liststyle=0

; proxyengine - Proxy backend. 0=SOCKS5/default, 1+=other (e.g. Shadowsocks). See proxylist.json type codes.
proxyengine=0

; bEnableSysWideProxy - Set Windows system proxy (PAC or manual). 0=no, 1=yes. Only for Browser-only mode.
bEnableSysWideProxy=0

; bUseOnlinePac - Use online PAC URL for system proxy. 0=use strUserExtendPacFile, 1=use strOnlinePacUrl.
bUseOnlinePac=0

; bGlobalMode - Legacy flag; use last_proxymode_index for routing mode instead.
bGlobalMode=0

; strOnlinePacUrl - URL of online PAC (Proxy Auto-Config) file when bUseOnlinePac=1. Empty if unused.
strOnlinePacUrl=

; strUserExtendPacFile - Path to local PAC file for browser-only proxy rules. Used when bUseOnlinePac=0.
strUserExtendPacFile=C:\Users\Foobis\AppData\Local\SSTap-beta\config\userpac.txt

; rememberuser - Remember last selected proxy node. 0=no, 1=yes.
rememberuser=0

; autologin - Auto-login or auto-select saved credentials. 0=no, 1=yes.
autologin=0

; appenabled - App enabled/active. 0=disabled, 1=enabled.
appenabled=1

; defaultportindex - Default proxy port index in multi-port configs. -1=none/auto.
defaultportindex=-1

; testurl - URL used for proxy connectivity test (e.g. Test Proxy button). Must be reachable when testing.
testurl=http://global.bing.com

; --- Physical (local) network adapter ---
; local_connection_name - Display name of the physical adapter (e.g. "Wi-Fi", "Ethernet").
local_connection_name=Wi-Fi

; local_connection_guid - Windows GUID of the physical adapter. Used for route table and Skip-China routing.
local_connection_guid={7D9AE79C-77D0-407F-B480-7279297C4E4C}

; local_connection_ip - Current IPv4 address of the physical adapter.
local_connection_ip=172.20.10.3

; local_connection_mask - Subnet mask of the physical adapter (e.g. 255.255.255.0).
local_connection_mask=255.255.255.240

; local_connection_gateway - Default gateway of the physical adapter.
local_connection_gateway=172.20.10.1

; local_connection_primary_dns - Primary DNS server for the physical adapter.
local_connection_primary_dns=172.20.10.1

; local_connection_second_dns - Secondary DNS server. Empty if none.
local_connection_second_dns=

; local_connection_DhcpNameServer - DNS server from DHCP (if applicable).
local_connection_DhcpNameServer=172.20.10.1

; --- Virtual tunnel (TAP/Wintun) adapter ---
; tap_connection_name - Display name of the tunnel adapter (e.g. "SSTAP 1", "SSStap").
tap_connection_name=SSTAP 1

; tap_connection_guid - Windows GUID of the tunnel adapter.
tap_connection_guid={D2ABBEEB-0D4F-40D1-ADE6-C448C8CC9545}

; tap_connection_index - Interface index of the tunnel adapter. Used for routing (traffic to proxy).
tap_connection_index=44

; local_connection_index - Interface index of the physical adapter. Used for Skip-China (China routes).
local_connection_index=8

; tap_adapter_configed - Whether tunnel adapter IP was configured. 0=no, 1=yes. Auto-set by app.
tap_adapter_configed=0

; bReduceTCPDelayedACK - Reduce TCP delayed ACK for lower latency. 0=no, 1=yes. Default 1 recommended.
bReduceTCPDelayedACK=1

; bDontProxyUDP - Do not proxy UDP traffic. 0=proxy UDP, 1=only TCP. Useful if UDP causes issues.
bDontProxyUDP=0

; local_connection_shortest_r_nexthop - Next-hop for shortest route (routing table).
local_connection_shortest_r_nexthop=172.20.10.1

; local_connection_shortest_r_directhop - Direct hop flag for routing. 0=via gateway, 1=direct.
local_connection_shortest_r_directhop=0

; local_connection_shortest_r_ifindex - Interface index for shortest route.
local_connection_shortest_r_ifindex=8

; bRegenerateIVForSSUDP - Regenerate IV for Shadowsocks UDP. 0=no, 1=yes. Shadowsocks/SSR only.
bRegenerateIVForSSUDP=0

; last_proxymode_index - Last selected routing mode. 0=Global (all traffic), 1=China IP only, 2=Skip China IP, 3=Browser only.
last_proxymode_index=0

; bIsFirstRunApp - First-run flag. 0=already run before, 1=first launch. Auto-set by app.
bIsFirstRunApp=0

; DelayedConnect - Delay in seconds before auto-connect (when AutomaticallyEstablishConnection=1). Default 10.
DelayedConnect=10

; LastUsedNodeId - Index of last selected proxy in proxylist.json. -1 or 0-based index.
LastUsedNodeId=0
